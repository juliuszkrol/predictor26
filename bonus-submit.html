<!DOCTYPE html>
<html>
<head>
  <title>🎯 Bonusy</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    #bonus-form {
      max-width: 500px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 14px;
      background: #4fc3f7;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    #message {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🎯 Bonusy</h1>

<form id="bonus-form">

  <input name="name" placeholder="Imię" required>

  <input name="Winner" placeholder="Zwycięzca" required>
  <input name="TopScorer" placeholder="Strzelec" required>
  <input name="TopAssist" placeholder="Asystent" required>
  <input name="MVP" placeholder="MVP" required>
  <input name="YoungMVP" placeholder="Young MVP" required>
  <input name="Goalkeeper" placeholder="Bramkarz" required>

  <button type="submit">Wyślij bonusy</button>

</form>

<p id="message"></p>

<script>

const scriptUrl = "https://script.google.com/macros/s/AKfycbyvSSPCUt5A533aoBXhCbKhFoxQR6puGMTlxENC6EC2yC_e3q5HHn8ADI18rocyprjI/exec";;

document.getElementById("bonus-form").addEventListener("submit", function(e) {

  e.preventDefault();

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  fetch(scriptUrl, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    }
  })
  .then(response => response.json())
  .then(result => {

    if (result.success) {

      document.getElementById("message").textContent =
        "Bonusy wysłane!";

      e.target.reset();

    } else {

      document.getElementById("message").textContent =
        result.message;
    }
  })
  .catch(error => {

    console.error(error);

    document.getElementById("message").textContent =
      "Błąd. Spróbuj ponownie.";
  });

});

</script>

</body>
</html>
