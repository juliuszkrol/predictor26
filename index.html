<!DOCTYPE html>
<html>
<head>
  <title>World Cup Pool</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
    }

    .box {
      background: #1a2238;
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      margin: auto;
    }

    a {
      color: #4fc3f7;
      text-decoration: none;
      font-weight: bold;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #4fc3f7;
      color: black;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>⚽ World Cup Pool 2026</h1>

    <p>
      Predict match results, earn points, and compete with friends.
    </p>

    <button onclick="window.location.href='https://google.com'">
      Submit Predictions
    </button>

    <p style="margin-top:30px;">
      Leaderboard coming soon.
    </p>
  </div>

</body>
</html>
