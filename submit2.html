<!DOCTYPE html>
<html>
<head>
 
  <style>
  body {
    font-family: Arial;
    background: #0b1020;
    color: white;
    margin: 0;
    padding: 40px;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
  }

  #prediction-form {
    max-width: 500px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
  }

   select {
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

  button {
    padding: 14px;
    background: #4fc3f7;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
  }

  #message {
    text-align: center;
    margin-top: 20px;
    font-size: 18px;
  }
</style>
  
</head>

<body>
   <title>⚽ Wyślij typy</title>

<form id="prediction-form" autocomplete="off">
  <select name="name" required>
  <option value="">Wybierz imię</option>

  <option>Alan</option>
  <option>Albert</option>
  <option>Bartek</option>
  <option>Czarek</option>
  <option>Juliusz</option>
  <option>Kacper</option>
  <option>Konrad Kr.</option>
  <option>Konrad Ku.</option>
  <option>Maciek</option>
  <option>Magda</option>
  <option>Mariusz</option>
  <option>Michał Cz.</option>
  <option>Michał K.</option>
  <option>Patryk</option>
  <option>Paweł</option>
  <option>Piotrek</option>
  <option>Przemek</option>
  <option>Tomasz</option>
  <option>Witek</option>

</select>

  <input name="MEX-RSA" placeholder="MEX-RSA, e.g. 2:1" required>
  <input name="KOR-CZE" placeholder="KOR-CZE, e.g. 1:1" required>
  <input name="CAN-BIH" placeholder="CAN-BIH, e.g. 0:2" required>
  <input name="QAT-SUI" placeholder="QAT-SUI" required>
<input name="BRA-MAR" placeholder="BRA-MAR" required>
<input name="HAI-SCO" placeholder="HAI-SCO" required>
<input name="USA-PAR" placeholder="USA-PAR" required>
<input name="AUS-TUR" placeholder="AUS-TUR" required>
<input name="GER-CUW" placeholder="GER-CUW" required>
<input name="CIV-ECU" placeholder="CIV-ECU" required>
<input name="NED-JPN" placeholder="NED-JPN" required>
<input name="SWE-TUN" placeholder="SWE-TUN" required>
<input name="BEL-EGY" placeholder="BEL-EGY" required>
<input name="IRN-NZL" placeholder="IRN-NZL" required>
<input name="ESP-CPV" placeholder="ESP-CPV" required>
<input name="KSA-URU" placeholder="KSA-URU" required>
<input name="FRA-SEN" placeholder="FRA-SEN" required>
<input name="IRQ-NOR" placeholder="IRQ-NOR" required>
<input name="ARG-ALG" placeholder="ARG-ALG" required>
<input name="AUT-JOR" placeholder="AUT-JOR" required>
<input name="POR-COD" placeholder="POR-COD" required>
<input name="UZB-COL" placeholder="UZB-COL" required>
<input name="ENG-CRO" placeholder="ENG-CRO" required>
<input name="GHA-PAN" placeholder="GHA-PAN" required>

  <button type="submit">Wyślij typy</button>
</form>

<p id="message"></p>

<script>
const scriptUrl = "https://script.google.com/macros/s/AKfycbwd9U5uTtbMhjYWKpL0iLDlZfSAAyjzYIh4I_HWCoxTXT-Px772SLGeJxV4kcmbyRvv/exec";

document.getElementById("prediction-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  fetch(scriptUrl, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    }
  })
  .then(response => response.json())
  .then(result => {
    if (result.success) {
      document.getElementById("message").textContent = "Typy wysłane!";
      e.target.reset();
    } else {
      document.getElementById("message").textContent = result.message;
    }
  })
  .catch(error => {
    console.error(error);
    document.getElementById("message").textContent = "Błąd. Spróbuj ponownie.";
  });
});
</script>

</body>
</html>
