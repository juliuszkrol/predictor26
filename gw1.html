<!DOCTYPE html>
<html>
<head>
  <title>Kolejka 1 - World Cup Pool</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: #1a2238;
      padding: 40px;
      border-radius: 16px;
    }

    h1 {
      font-size: 48px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 30px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      min-width: 600px;
    }

    th {
      background: #4fc3f7;
      color: black;
      padding: 6px;
      font-weight: bold;
      font-size: 12px;
      white-space: nowrap;
      border-right: 1px solid #1a2238;
    }

    td {
      padding: 4px;
      border-bottom: 1px solid #ddd;
      border-right: 1px solid #ddd;
      text-align: center;
      font-size: 11px;
      white-space: nowrap;
    }

    td:first-child, th:first-child {
      text-align: left;
      font-weight: bold;
      position: sticky;
      left: 0;
      background: white;
      z-index: 2;
    }

    th:first-child {
      background: #4fc3f7;
    }

    .actual-row td {
      background: #1e3a5f;
      color: white;
      font-weight: bold;
      border-bottom: 2px solid #4fc3f7;
    }

    .exact {
      background: #b7f7c1;
      font-weight: bold;
    }

    .difference {
      background: #ffd08a;
      font-weight: bold;
    }

    .correct {
      background: #fff3a3;
      font-weight: bold;
    }

    .total-cell {
      font-weight: bold;
      background: #e0e7ff;
    }
.gold {
  background: #ffd700 !important;
  color: black !important;
  font-weight: bold;
}

.silver {
  background: #c0c0c0 !important;
  color: black !important;
  font-weight: bold;
}

.bronze {
  background: #cd7f32 !important;
  color: white !important;
  font-weight: bold;
}
    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 24px;
      background: #4fc3f7;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>⚽ Kolejka 1</h1>

    <p>Predictions and results for Gameweek 1.</p>

    <div class="table-wrapper">
      <table id="data-table"></table>
    </div>

    <a class="button" href="leaderboard.html">
      Back to Leaderboards
    </a>
  </div>

  <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpZjNU0JBFZgJA0ebw6Xo5tHQi2GlBaYSYB-MaJ9u3ZXKjDCdYIijJ2gCoDja4cVfK5p8iq2vppsS_/pub?gid=1429651543&single=true&output=csv";

    function parseScore(score) {
      if (!score) return null;
      const cleaned = score.trim().replace(/\s/g, "");
      const match = cleaned.match(/^(\d+)[-:](\d+)$/);
      if (!match) return null;

      return {
        home: Number(match[1]),
        away: Number(match[2])
      };
    }

    function getOutcome(score) {
      if (score.home > score.away) return "home";
      if (score.home < score.away) return "away";
      return "draw";
    }

    function calculatePoints(prediction, actual) {
      const pred = parseScore(prediction);
      const act = parseScore(actual);

      if (!pred || !act) return { points: 0, className: "" };

      const predDiff = pred.home - pred.away;
      const actDiff = act.home - act.away;

      if (pred.home === act.home && pred.away === act.away) {
        return { points: 4, className: "exact" };
      }

      if (predDiff === actDiff) {
        return { points: 2, className: "difference" };
      }

      if (getOutcome(pred) === getOutcome(act)) {
        return { points: 1, className: "correct" };
      }

      return { points: 0, className: "" };
    }

    function renderRow(row, rowIndex, totalPoints = "") {
      const tr = document.createElement("tr");

      if (rowIndex === 1) {
        tr.classList.add("actual-row");
      }

      row.forEach((cell, cellIndex) => {
        const element = rowIndex === 0 ? "th" : "td";
        const td = document.createElement(element);
        td.textContent = cell;

        tr.appendChild(td);

        if (cellIndex === 0) {
          const totalCell = document.createElement(rowIndex === 0 ? "th" : "td");
          totalCell.classList.add("total-cell");

          if (rowIndex === 0) {
            totalCell.textContent = "Total";
          } else if (rowIndex === 1) {
            totalCell.textContent = "";
          } else {
            totalCell.textContent = totalPoints;
          }

          tr.appendChild(totalCell);
        }
      });

      return tr;
    }

    fetch(csvUrl)
      .then(response => response.text())
      .then(data => {
        const rows = data.trim().split("\n").map(row => row.split(","));
        const table = document.getElementById("data-table");

        const headerRow = rows[0];
        const actualRow = rows[1];
        const playerRows = rows.slice(2);

        const processedPlayers = playerRows.map(row => {
          let total = 0;
          const cellClasses = [];

          row.forEach((cell, cellIndex) => {
            if (cellIndex > 0) {
              const actualResult = actualRow[cellIndex];
              const result = calculatePoints(cell, actualResult);
              total += result.points;
              cellClasses[cellIndex] = result.className;
            }
          });

          return {
            row,
            total,
            cellClasses
          };
        });

        processedPlayers.sort((a, b) => b.total - a.total);
        

        table.appendChild(renderRow(headerRow, 0));
        table.appendChild(renderRow(actualRow, 1));

        processedPlayers.forEach((player, index) => {
       
          const tr = renderRow(player.row, 2, player.total);

          const nameCell = tr.children[0];

          if (index === 0) {
            nameCell.classList.add("gold");
          } else if (index === 1) {
            nameCell.classList.add("silver");
          } else if (index === 2) {
            nameCell.classList.add("bronze");
          }

          player.cellClasses.forEach((className, cellIndex) => {
            if (!className) return;

            const displayedCellIndex = cellIndex + 1;
            tr.children[displayedCellIndex].classList.add(className);
          });

          table.appendChild(tr);

        });
      });
  </script>
     

</body>
</html>
