<!DOCTYPE html>
<html>
<head>
  <title>Kolejka 1 - World Cup Pool</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: #1a2238;
      padding: 40px;
      border-radius: 16px;
    }

    h1 {
      font-size: 48px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 30px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      min-width: 900px;
    }

   th {
  background: #4fc3f7;
  color: black;
  padding: 6px;
  font-weight: bold;
  position: sticky;
  top: 0;
  font-size: 12px;
  white-space: nowrap;
}

td {
  padding: 4px;
  border-bottom: 1px solid #ddd;
  text-align: center;
  font-size: 11px;
  white-space: nowrap;
}
    td:first-child, th:first-child {
      text-align: left;
      font-weight: bold;
      position: sticky;
      left: 0;
      background: white;
    }

    th:first-child {
      background: #4fc3f7;
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 24px;
      background: #4fc3f7;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>⚽ Kolejka 1</h1>

    <p>Predictions and results for Gameweek 1.</p>

    <div class="table-wrapper">
      <table id="data-table"></table>
    </div>

    <a class="button" href="leaderboard.html">
      Back to Leaderboards
    </a>

  </div>

  <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpZjNU0JBFZgJA0ebw6Xo5tHQi2GlBaYSYB-MaJ9u3ZXKjDCdYIijJ2gCoDja4cVfK5p8iq2vppsS_/pub?gid=1429651543&single=true&output=csv";

    fetch(csvUrl)
      .then(response => response.text())
      .then(data => {
        const rows = data
          .trim()
          .split("\n")
          .map(row => row.split(","));

        const table = document.getElementById("data-table");

        rows.forEach((row, index) => {
          const tr = document.createElement("tr");

          row.forEach(cell => {
            const element = index === 0 ? "th" : "td";
            const td = document.createElement(element);
            td.textContent = cell;
            tr.appendChild(td);
          });

          table.appendChild(tr);
        });
      });
  </script>

</body>
</html>
