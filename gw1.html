<!DOCTYPE html>
<html>
<head>
  <title>Kolejka 1 - World Cup Pool</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: #1a2238;
      padding: 40px;
      border-radius: 16px;
    }

    h1 {
      font-size: 48px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 30px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      min-width: 600px;
    }

   th {
  background: #4fc3f7;
  color: black;
  padding: 6px;
  font-weight: bold;
  position: sticky;
  top: 0;
  font-size: 12px;
  white-space: nowrap;
}

td {
  padding: 4px;
  border-bottom: 1px solid #ddd;
  text-align: center;
  font-size: 11px;
  white-space: nowrap;
}
    td:first-child, th:first-child {
      text-align: left;
      font-weight: bold;
      position: sticky;
      left: 0;
      background: white;
    }

    th:first-child {
      background: #4fc3f7;
    }
    .actual-row td {
  font-weight: bold;
}

    .exact {
  background: #b7f7c1;
  font-weight: bold;
}

.difference {
  background: #ffd08a;
  font-weight: bold;
}

.correct {
  background: #fff3a3;
  font-weight: bold;
}



.total-cell {
  font-weight: bold;
  background: #e0e7ff;
}
    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 24px;
      background: #4fc3f7;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>⚽ Kolejka 1</h1>

    <p>Predictions and results for Gameweek 1.</p>

    <div class="table-wrapper">
      <table id="data-table"></table>
    </div>

    <a class="button" href="leaderboard.html">
      Back to Leaderboards
    </a>

  </div>

  <script>
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpZjNU0JBFZgJA0ebw6Xo5tHQi2GlBaYSYB-MaJ9u3ZXKjDCdYIijJ2gCoDja4cVfK5p8iq2vppsS_/pub?gid=1429651543&single=true&output=csv";

  function parseScore(score) {
    if (!score) return null;
    const cleaned = score.trim().replace(/\s/g, "");
    const match = cleaned.match(/^(\d+)[-:](\d+)$/);
    if (!match) return null;

    return {
      home: Number(match[1]),
      away: Number(match[2])
    };
  }

  function getOutcome(score) {
    if (score.home > score.away) return "home";
    if (score.home < score.away) return "away";
    return "draw";
  }

  function calculatePoints(prediction, actual) {
    const pred = parseScore(prediction);
    const act = parseScore(actual);

    if (!pred || !act) return { points: 0, className: "" };

    const predDiff = pred.home - pred.away;
    const actDiff = act.home - act.away;

    if (pred.home === act.home && pred.away === act.away) {
      return { points: 4, className: "exact" };
    }

    if (predDiff === actDiff) {
      return { points: 2, className: "difference" };
    }

    if (getOutcome(pred) === getOutcome(act)) {
      return { points: 1, className: "correct" };
    }

    return { points: 0, className: "wrong" };
  }

  fetch(csvUrl)
    .then(response => response.text())
    .then(data => {
      const rows = data
        .trim()
        .split("\n")
        .map(row => row.split(","));

      const table = document.getElementById("data-table");

      rows.forEach((row, rowIndex) => {
        const tr = document.createElement("tr");
        if (rowIndex === 1) {
  tr.classList.add("actual-row");
}

        let totalPoints = 0;

        row.forEach((cell, cellIndex) => {
          const element = rowIndex === 0 ? "th" : "td";
          const td = document.createElement(element);
          td.textContent = cell;

          if (rowIndex > 1 && cellIndex > 0) {
            const actualResult = rows[1][cellIndex];
            const result = calculatePoints(cell, actualResult);

            totalPoints += result.points;

            if (result.className) {
              td.classList.add(result.className);
            }
          }

          tr.appendChild(td);
        });

        if (rowIndex === 0) {
          const th = document.createElement("th");
          th.textContent = "Total";
          tr.appendChild(th);
        } else if (rowIndex === 1) {
          const td = document.createElement("td");
          td.textContent = "Actual";
          td.classList.add("total-cell");
          tr.appendChild(td);
        } else {
          const td = document.createElement("td");
          td.textContent = totalPoints;
          td.classList.add("total-cell");
          tr.appendChild(td);
        }

        table.appendChild(tr);
      });
    });
</script>
  

</body>
</html>
